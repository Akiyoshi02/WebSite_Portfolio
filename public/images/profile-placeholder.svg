      <stop offset="0.42" stop-color="#7b2fff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <filter id="profileSoftGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

