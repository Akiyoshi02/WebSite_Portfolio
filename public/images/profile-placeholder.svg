<svg width="840" height="1050" viewBox="0 0 840 1050" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="profileTitle profileDesc">
  <title id="profileTitle">Profile image placeholder</title>
  <desc id="profileDesc">A modern neutral profile placeholder used when no portrait image is set.</desc>

  <defs>
    <linearGradient id="profileRingGradient" x1="190" y1="300" x2="650" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00f5d4"/>
      <stop offset="0.52" stop-color="#7b2fff"/>
      <stop offset="1" stop-color="#ff4ecd"/>
    </linearGradient>

    <radialGradient id="profileGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 510) rotate(90) scale(360 320)">
