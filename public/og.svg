<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff4ecd"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="white" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="72" y="120" width="4" height="390" rx="2" fill="url(#hero)" opacity="0.85"/>

  <!-- Code label -->
  <text x="98" y="168" fill="#00f5d4" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="500" opacity="0.9">&lt; Hello World /&gt;</text>

  <!-- Main name -->
  <text x="96" y="278" fill="white" font-family="Syne, Arial Black, Arial, sans-serif" font-size="88" font-weight="700" letter-spacing="-2">Akiyoshi Yapa</text>

  <!-- Role line with gradient pill -->
  <rect x="96" y="308" width="474" height="52" rx="26" fill="url(#hero)" opacity="0.14"/>
  <text x="120" y="342" fill="url(#hero)" font-family="DM Sans, system-ui, sans-serif" font-size="26" font-weight="600">Software Engineer &amp; Full-Stack Developer</text>

  <!-- Tags row -->
  <rect x="96" y="386" width="152" height="40" rx="20" fill="rgba(0,245,212,0.12)"/>
  <text x="172" y="412" text-anchor="middle" fill="#00f5d4" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500">Full-Stack</text>

  <rect x="262" y="386" width="104" height="40" rx="20" fill="rgba(123,47,255,0.12)"/>
  <text x="314" y="412" text-anchor="middle" fill="#9b72ff" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500">AI/ML</text>

  <rect x="380" y="386" width="116" height="40" rx="20" fill="rgba(255,78,205,0.12)"/>
  <text x="438" y="412" text-anchor="middle" fill="#ff4ecd" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500">Backend</text>

  <rect x="510" y="386" width="102" height="40" rx="20" fill="rgba(255,200,87,0.12)"/>
  <text x="561" y="412" text-anchor="middle" fill="#ffc857" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="500">DevOps</text>

  <!-- Location / URL footer -->
  <text x="96" y="512" fill="#9aa4b2" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="400">Sri Lanka - akiyoshiyapa.netlify.app</text>

  <!-- Open to work badge -->
  <circle cx="1064" cy="180" r="56" fill="rgba(32,224,128,0.08)" stroke="#20e080" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="1064" cy="152" r="7" fill="#20e080"/>
  <text x="1064" y="186" text-anchor="middle" fill="#20e080" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="600">Open</text>
  <text x="1064" y="208" text-anchor="middle" fill="#20e080" font-family="DM Sans, system-ui, sans-serif" font-size="18" font-weight="600">to Work</text>

  <!-- Decorative code snippet, bottom right -->
  <text x="820" y="430" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="17" opacity="0.12">const developer = {</text>
  <text x="820" y="458" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="17" opacity="0.12">  stack: [&quot;React&quot;, &quot;Node&quot;, &quot;AI&quot;],</text>
  <text x="820" y="486" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="17" opacity="0.12">  building: &quot;great software&quot;</text>
  <text x="820" y="514" fill="white" font-family="JetBrains Mono, Consolas, monospace" font-size="17" opacity="0.12">};</text>
</svg>
