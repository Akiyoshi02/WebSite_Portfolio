[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Optional friendly URL for the contact handler
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
