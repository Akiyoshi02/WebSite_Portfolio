[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # These values are intentionally public/client-side config or public identity metadata.
  # Keep real secrets (SMTP_PASS, GH_TOKEN, NETLIFY_BUILD_HOOK_URL) out of this list.
  SECRETS_SCAN_OMIT_KEYS = "SITE_URL,PORTFOLIO_SITE_NAME,PORTFOLIO_SITE_TAGLINE,PUBLIC_SUPABASE_URL,PUBLIC_SUPABASE_ANON_KEY,PUBLIC_ADMIN_EMAILS,ADMIN_EMAILS,CONTACT_TO_EMAIL,SMTP_FROM,SMTP_USER"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Optional friendly URL for the contact handler
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/rebuild"
  to = "/.netlify/functions/rebuild"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' https: blob:; connect-src 'self' https://api.github.com https://github.com https://*.supabase.co wss://*.supabase.co; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com; manifest-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/admin-panel/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin-panel"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
